function switchSub(sub){guidesSub=sub;renderGuides();}
function renderEncyclopedia(){
  const cats=['all','fire','shelter','water','food','signalling','psychology'];
  const counts={};ENCYCLOPEDIA.forEach(a=>counts[a.category]=(counts[a.category]||0)+1);
  const filterHtml=`<div class="filter-row">${cats.map(c=>{
    const n=c==='all'?ENCYCLOPEDIA.length:counts[c];
    return `<button class="filter-pill ${encFilter===c?'active':''}" onclick="setEncFilter('${c}')">${c==='all'?'All':CAT_LABELS[c]} <span class="cnt">${n}</span></button>`;}).join('')}</div>`;
  const items=ENCYCLOPEDIA.filter(a=>encFilter==='all'||a.category===encFilter);
  document.getElementById('guides-body').innerHTML=filterHtml+items.map(a=>fullCard('enc',a)).join('');
}
function setEncFilter(c){encFilter=c;renderEncyclopedia();}
function fullCard(type,a){
  const acc=accentOf(type,a);
  return `<a class="card c-${acc}" onclick="openArticle('${type}','${a.id}')">
    ${cardThumb(type,a)}
    <div class="card-body">
      <div class="cat-label t-${acc}">${kickerOf(type,a)}</div>
      <div class="card-title">${titleOf(type,a)}</div>
      ${a.summary?`<div class="card-sum">${a.summary}</div>`:(type==='knot'?`<div class="card-sum">${a.uses.slice(0,3).join(' · ')}</div>`:(type==='weather'?`<div class="card-sum">${a.sign}</div>`:(type==='track'?`<div class="card-sum">${a.track}</div>`:'')))}
      <div class="card-meta">
        ${a.difficulty?`<span class="chip diff-${a.difficulty}">${a.difficulty}</span>`:''}
        ${type==='knot'?`<span class="chip">Strength ${a.strengthRating}/5</span>`:''}
        ${type==='fa'&&a.callEmergency?'<span class="chip solid-danger">Call 000</span>':''}
        ${type==='plant'?`<span class="chip">${a.states.length} states</span>`:''}
        ${type==='track'&&/deadly|deadly|kill|venomous|aggressive/i.test(a.danger)?'<span class="chip solid-danger">Caution</span>':''}
        ${(type==='enc'&&a.australianNote)||(type==='fa'&&a.australianOnly)||type==='plant'||type==='track'?'<span class="chip">AU</span>':''}
      </div>
    </div>
    <button class="fav-star ${isFav(type,a.id)?'on':''}" onclick="event.stopPropagation();quickFav(this,'${type}','${a.id}')">${isFav(type,a.id)?ICON.starFill:ICON.star}</button>
  </a>`;
}
function quickFav(btn,type,id){toggleFav(type,id);const on=isFav(type,id);btn.classList.toggle('on',on);btn.innerHTML=on?ICON.starFill:ICON.star;}
function renderKnots(){document.getElementById('guides-body').innerHTML=KNOTS.map(k=>fullCard('knot',k)).join('');}

function renderFirstAid(){
  const order=['bleeding','burns','hypothermia','heat','snakes','spiders','fractures','shock','cpr','drowning','eye','allergy'];
  const grouped={};FIRST_AID.forEach(a=>{(grouped[a.category]=grouped[a.category]||[]).push(a);});
  let html=`${banner('ban-firstaid','First Aid','Protocols aligned with Australian Resuscitation Council guidance.')}
    <a class="call-000" href="tel:000"><div class="ring">${ICON.phone}</div>
      <div><div class="big">CALL 000</div><div class="sub">Ambulance · Fire · Police</div></div>
      <div class="tap">Tap to call</div></a>`;
  order.forEach(cat=>{if(grouped[cat])grouped[cat].forEach(a=>html+=fullCard('fa',a));});
  document.getElementById('screen-firstaid').innerHTML=html;
}

/* ============================================================
   ARTICLE VIEW
   ============================================================ */
function openArticle(type,id){
  const a=findArticle(type,id);if(!a)return;
  pushRecent(type,id);closeSearch();closeEmergency();
  articleReturnTab=(type==='fa')?'firstaid':(type==='proj')?'projects':'guides';
  let html;
  if(type==='enc')html=encArticleHtml(a);
  else if(type==='fa')html=faArticleHtml(a);
  else if(type==='knot')html=knotArticleHtml(a);
  else if(type==='proj')html=projArticleHtml(a);
  else if(type==='plant')html=plantArticleHtml(a);
  else if(type==='weather')html=weatherArticleHtml(a);
  else if(type==='track')html=trackArticleHtml(a);
  const src=imgFor(type,a);
  const photo=src?`<div class="art-photo"><img src="${src}" alt="" loading="eager"></div>`:'';
  const head=`<button class="back-btn" onclick="switchTab('${articleReturnTab}')">${ICON.back} Back</button>`;
  document.getElementById('screen-article').innerHTML=head+photo+`<div data-fav-type="${type}" data-fav-id="${id}">${html}</div>`;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-article').classList.add('active');
  document.getElementById('noteFab').style.display='none';
  currentTab=articleReturnTab;renderNav();window.scrollTo(0,0);
}
function favButton(type,id){const on=isFav(type,id);
  return `<button class="fav-big ${on?'on':''}" id="favBig" onclick="articleFav('${type}','${id}')" aria-label="Save">${on?ICON.starFill:ICON.star}</button>`;}
function articleFav(type,id){toggleFav(type,id);const b=document.getElementById('favBig');const on=isFav(type,id);
  b.classList.toggle('on',on);b.innerHTML=on?ICON.starFill:ICON.star;}

function encArticleHtml(a){const cat=a.category;
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-${cat}" style="margin-top:0">${ICON[CAT_ICON[cat]]&&''}${CAT_LABELS[cat]}</div>
      <h1 style="margin-top:0">${a.title}</h1></div>${favButton('enc',a.id)}</div>
    <div class="meta-row">${a.difficulty?`<span class="chip diff-${a.difficulty}">${a.difficulty}</span>`:''}${a.tags?a.tags.map(t=>`<span class="chip">${t}</span>`).join(''):''}</div>
    <div class="content">${a.content}</div>
    ${a.australianNote?`<div class="au-note"><div class="label">Australian Note</div>${a.australianNote}</div>`:''}
  </article>`;
}
function faArticleHtml(a){
  const checks=getChecks(a.id);const done=checks.length;const total=a.steps.length;
  const steps=a.steps.map((s,i)=>{const isDone=checks.includes(i);
    return `<li class="${isDone?'done':''}" onclick="stepTap('${a.id}',${i},this)">
      <span class="stepnum">${isDone?ICON.check:s.step}</span>
      <div class="instr">${s.instruction}</div>
      ${s.warning?`<div class="step-warn">${ICON.warn}<span>${s.warning}</span></div>`:''}</li>`;}).join('');
  const dn=a.doNot&&a.doNot.length?`<div class="donot-box"><div class="label">${ICON.warn} Do Not</div><ul>${a.doNot.map(d=>`<li>${d}</li>`).join('')}</ul></div>`:'';
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <span class="urgency-badge urgency-${a.urgency}">${ICON.alert} ${a.urgency}</span>
      <h1>${a.title}</h1></div>${favButton('fa',a.id)}</div>
    ${a.callEmergency?`<a class="call-000" href="tel:000"><div class="ring">${ICON.phone}</div><div><div class="big">CALL 000</div><div class="sub">Emergency — Australia</div></div><div class="tap">Tap</div></a>`:''}
    ${a.summary?`<p style="color:var(--text-secondary);margin-bottom:6px">${a.summary}</p>`:''}
    <div class="progress-row"><span class="pl" id="prog-${a.id}">${done} / ${total} steps · tap to tick off</span>${done?`<button class="reset" onclick="resetSteps('${a.id}')">Reset</button>`:''}</div>
    <ul class="steps-list tickable">${steps}</ul>
    ${dn}
    ${a.notes?`<div class="notes-box"><strong>Field notes:</strong> ${a.notes}</div>`:''}
    ${a.content?`<div class="content"><p>${a.content}</p></div>`:''}
  </article>`;
}
function stepTap(id,idx,li){toggleCheck(id,idx);const on=getChecks(id).includes(idx);
  li.classList.toggle('done',on);const step=idx+1;
  li.querySelector('.stepnum').innerHTML=on?ICON.check:findArticle('fa',id).steps[idx].step;
  updateProg(id);}
function updateProg(id){const a=findArticle('fa',id)||findArticle('proj',id);if(!a)return;
  const total=a.steps.length;const done=getChecks(id).length;
  const el=document.getElementById('prog-'+id);if(el)el.textContent=`${done} / ${total} steps · tap to tick off`;}
function resetSteps(id){resetChecks(id);const a=findArticle('fa',id);openArticle('fa',id);}
function resetPSteps(id){resetChecks(id);openArticle('proj',id);}

/* ---- Knot rope-diagram engine ---- */
function rope(d,s){const b=s?'body2':'body',h=s?'hi2':'hi';
  return `<path class="out" d="${d}"/><path class="${b}" d="${d}"/><path class="${h}" d="${d}"/>`;}
function poleV(x){return `<rect class="post" x="${x}" y="6" width="32" height="196" rx="9"/>`+
  `<line class="grain-l" x1="${x+10}" y1="10" x2="${x+10}" y2="198"/><line class="grain-l" x1="${x+22}" y1="10" x2="${x+22}" y2="198"/>`;}
function poleH(y){return `<rect class="post" x="4" y="${y}" width="292" height="32" rx="9"/>`+
  `<line class="grain-l" x1="10" y1="${y+10}" x2="290" y2="${y+10}"/><line class="grain-l" x1="10" y1="${y+22}" x2="290" y2="${y+22}"/>`;}

const TWO_ROPE=['sheet-bend','reef-knot','fishermans'];
function knotSvg(id){const inner=KSVG[id];if(!inner)return '';
  return `<div class="knot-fig"><svg viewBox="0 0 300 204" xmlns="http://www.w3.org/2000/svg">${inner}</svg></div>`;}

function knotArticleHtml(k){
  const dots=`<span class="dots">${[1,2,3,4,5].map(i=>`<span class="dot ${i<=k.strengthRating?'on':''}"></span>`).join('')}</span>`;
  const steps=k.steps.map((s,i)=>`<li><span class="stepnum">${i+1}</span><div class="instr">${s}</div></li>`).join('');
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-knot" style="margin-top:0">${k.category.replace('-',' / ')}</div>
      <h1 style="margin-top:0">${k.name}</h1></div>${favButton('knot',k.id)}</div>
    <div class="meta-row"><span class="chip diff-${k.difficulty}">${k.difficulty}</span><span class="chip">Strength ${dots}</span></div>
    <div class="uses-row">${k.uses.map(u=>`<span class="chip">${u}</span>`).join('')}</div>
    <div class="section-label">Diagram</div>
    ${knotSvg(k.id)}
    <div class="knot-legend">
      <span><i style="background:#c6a063"></i>Main rope${TWO_ROPE.includes(k.id)?'':' (working &amp; standing ends)'}</span>
      ${TWO_ROPE.includes(k.id)?'<span><i style="background:#8f9c6a"></i>Second rope</span>':''}
      <span><i class="twist"></i>Twist of the lay</span>
    </div>
    <div class="section-label">Tying Steps</div>
    <ul class="steps-list">${steps}</ul>
    ${k.tips?`<div class="tip-box"><div class="label">Tip</div>${k.tips}</div>`:''}
  </article>`;
}
function projArticleHtml(p){
  const checks=getChecks(p.id);const done=checks.length;const total=p.steps.length;
  const mats=p.materials.map(m=>`<li>${m}</li>`).join('');
  const steps=p.steps.map((s,i)=>{const isDone=checks.includes(i);
    return `<li class="${isDone?'done':''}" onclick="pstepTap('${p.id}',${i},this)">
      <span class="stepnum">${isDone?ICON.check:s.step}</span>
      <div class="instr"><strong>${s.title}</strong>${s.detail?`<div style="color:var(--text-secondary);font-size:.86rem;margin-top:3px;font-weight:400">${s.detail}</div>`:''}</div></li>`;}).join('');
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-project" style="margin-top:0">${p.category.replace('-',' ')}</div>
      <h1 style="margin-top:0">${p.title}</h1></div>${favButton('proj',p.id)}</div>
    <div class="meta-row"><span class="chip diff-${p.difficulty}">${p.difficulty}</span><span class="chip">${p.timeMinutes} min</span></div>
    <div class="section-label">Materials</div>
    <ul class="materials-list">${mats}</ul>
    <div class="progress-row"><span class="pl" id="prog-${p.id}">${done} / ${total} steps · tap to tick off</span>${done?`<button class="reset" onclick="resetPSteps('${p.id}')">Reset</button>`:''}</div>
    <ul class="steps-list tickable">${steps}</ul>
    ${p.tips?`<div class="tip-box"><div class="label">Tip</div>${p.tips}</div>`:''}
  </article>`;
}
function plantArticleHtml(p){
  const eat=p.eat.map(e=>`<li>${e}</li>`).join('');
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-food" style="margin-top:0">Bush Tucker</div>
      <h1 style="margin-top:0">${p.name}</h1>
      <div style="font-style:italic;color:var(--text-secondary);font-size:.92rem;margin-top:2px">${p.sci}</div></div>${favButton('plant',p.id)}</div>
    <div class="states-row">${p.states.map(s=>`<span class="state-chip">${s}</span>`).join('')}</div>
    <p style="color:var(--text-secondary);margin-bottom:8px">${p.summary}</p>
    <div class="safety-bar">${ICON.warn}<div><div class="st">Positively identify first</div>
      <div class="sd">Do not eat unless you are certain of the species. Toxic lookalikes exist.</div></div></div>
    <div class="section-label">How it's used</div>
    <ul class="content" style="margin:0 0 var(--s2) 1.1em">${eat}</ul>
    <div class="section-label">Identifying it</div>
    <div class="content"><p>${p.id_notes}</p></div>
    <div class="caution-box"><div class="label">${ICON.warn} Caution</div><div class="sd" style="font-size:.88rem;color:#e7bdbd">${p.caution}</div></div>
    <div class="content"><p>${p.content}</p></div>
  </article>`;
}
function weatherArticleHtml(w){
  const acc=accentOf('weather',w);
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-${acc}" style="margin-top:0">${kickerOf('weather',w)}</div>
      <h1 style="margin-top:0">${w.name}</h1></div>${favButton('weather',w.id)}</div>
    <div class="section-label">What you see</div><div class="content"><p>${w.sign}</p></div>
    <div class="section-label">What it means</div><div class="content"><p>${w.means}</p></div>
    <div class="${w.omen==='danger'?'caution-box':'tip-box'}">
      <div class="label" ${w.omen==='danger'?'':'style="color:var(--warning)"'}>${w.omen==='danger'?ICON.warn+' Take action':'Action'}</div>
      <div class="sd" style="font-size:.9rem;color:${w.omen==='danger'?'#e7bdbd':'var(--text-secondary)'}">${w.action}</div></div>

function trackArticleHtml(t){
  const dangerKey=/deadly|kill|venomous|aggressive|spur/i.test(t.danger);
  return `<article class="article">
    <div class="article-head"><div style="flex:1">
      <div class="section-label t-food" style="margin-top:0">Animal Sign</div>
      <h1 style="margin-top:0">${t.name}</h1>
      <div style="font-style:italic;color:var(--text-secondary);font-size:.92rem;margin-top:2px">${t.sci}</div></div>${favButton('track',t.id)}</div>
    <div class="states-row"><span class="state-chip" style="background:rgba(90,134,166,.16);color:var(--water);border-color:rgba(90,134,166,.3)">${t.where}</span></div>
    <div class="section-label">Tracks</div><div class="content"><p>${t.track}</p></div>
    <div class="section-label">Other sign</div><div class="content"><p>${t.sign}</p></div>
    <div class="section-label">Behaviour</div><div class="content"><p>${t.behaviour}</p></div>
    <div class="tip-box"><div class="label">Why it matters</div>${t.value}</div>
    <div class="${dangerKey?'caution-box':'notes-box'}">${dangerKey?`<div class="label">${ICON.warn} Danger</div>`:'<strong>Note: </strong>'}<span class="sd" style="font-size:.9rem;${dangerKey?'color:#e7bdbd':''}">${t.danger}</span></div>
    <div class="content"><p>${t.content}</p></div>
  </article>`;
}
function pstepTap(id,idx,li){toggleCheck(id,idx);const on=getChecks(id).includes(idx);
  li.classList.toggle('done',on);li.querySelector('.stepnum').innerHTML=on?ICON.check:findArticle('proj',id).steps[idx].step;updateProg(id);}

/* ============================================================
   SEARCH
   ============================================================ */
let SEARCH_INDEX=[];
function buildSearchIndex(){
  SEARCH_INDEX=[];
  ENCYCLOPEDIA.forEach(a=>SEARCH_INDEX.push({type:'enc',id:a.id,title:a.title,kw:(a.title+' '+a.summary+' '+(a.tags||[]).join(' ')+' '+CAT_LABELS[a.category]).toLowerCase()}));
  FIRST_AID.forEach(a=>SEARCH_INDEX.push({type:'fa',id:a.id,title:a.title,kw:(a.title+' '+a.summary+' '+a.category+' first aid').toLowerCase()}));
  KNOTS.forEach(a=>SEARCH_INDEX.push({type:'knot',id:a.id,title:a.name,kw:(a.name+' '+a.uses.join(' ')+' '+a.category+' knot').toLowerCase()}));
  PROJECTS.forEach(a=>SEARCH_INDEX.push({type:'proj',id:a.id,title:a.title,kw:(a.title+' '+a.category+' project').toLowerCase()}));
  PLANTS.forEach(a=>SEARCH_INDEX.push({type:'plant',id:a.id,title:a.name,kw:(a.name+' '+a.sci+' '+a.summary+' bush tucker edible plant food '+a.states.join(' ')).toLowerCase()}));
  WEATHER.forEach(a=>SEARCH_INDEX.push({type:'weather',id:a.id,title:a.name,kw:(a.name+' '+a.sign+' '+a.means+' weather sky cloud forecast storm rain').toLowerCase()}));
  TRACKS.forEach(a=>SEARCH_INDEX.push({type:'track',id:a.id,title:a.name,kw:(a.name+' '+a.sci+' '+a.track+' '+a.where+' animal track sign scat').toLowerCase()}));
}
function openSearch(){document.getElementById('search').classList.add('open');document.body.style.overflow='hidden';
  const inp=document.getElementById('searchInput');inp.value='';runSearch('');setTimeout(()=>inp.focus(),50);}
function closeSearch(){document.getElementById('search').classList.remove('open');document.body.style.overflow='';}
function runSearch(q){
  q=q.trim().toLowerCase();const res=document.getElementById('searchResults');
  if(!q){res.innerHTML=`<div class="search-hint">Search across all guides, first aid, knots and projects.</div>`;return;}
  const terms=q.split(/\s+/);
  const hits=SEARCH_INDEX.filter(x=>terms.every(t=>x.kw.includes(t)));
  if(!hits.length){res.innerHTML=`<div class="search-hint">No matches for "${escapeHtml(q)}".</div>`;return;}
  res.innerHTML=hits.map(h=>{const a=findArticle(h.type,h.id);return miniCard(h.type,a);}).join('');
}

   SETTINGS
   ============================================================ */
function applySettings(){const s=LS.get('bc_settings',{theme:'dark',nightMode:true,textSize:'normal'});
  document.body.setAttribute('data-textsize',s.textSize||'normal');}
function openSettings(){
  const s=LS.get('bc_settings',{textSize:'normal'});
  document.querySelectorAll('#textSizeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.size===(s.textSize||'normal')));
  document.getElementById('setOffline').textContent='Day '+daysOffline()+' — works with no signal';
  document.getElementById('setSaved').textContent=getFavs().length+' article'+(getFavs().length===1?'':'s')+' saved';
  document.getElementById('setNotes').textContent=getNotes().length+' note'+(getNotes().length===1?'':'s')+' on this device';
  document.getElementById('settingsModal').classList.add('open');document.body.style.overflow='hidden';}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');document.body.style.overflow='';}
function setTextSize(size){const s=LS.get('bc_settings',{});s.textSize=size;LS.set('bc_settings',s);applySettings();
  document.querySelectorAll('#textSizeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.size===size));}
let creditsLoaded=false;
function toggleCredits(){
  const box=document.getElementById('creditsBox');
  if(box.style.display==='none'){box.style.display='block';
    if(!creditsLoaded){creditsLoaded=true;box.innerHTML='Loading…';
      fetch('img/credits.json').then(r=>r.json()).then(cr=>{
        const rows=Object.values(cr).map(c=>`<div>• <a href="${c.descurl}" target="_blank" rel="noopener">${escapeHtml((c.file||'').replace(/^File:/,''))}</a> — ${escapeHtml(c.artist||'Unknown')}${c.license?' ('+escapeHtml(c.license)+')':''}</div>`).join('');
        box.innerHTML=`<p style="margin-bottom:8px">Photographs sourced from Wikimedia Commons under their respective licences (CC BY / CC BY-SA / public domain). Full source & licence per image:</p>${rows}`;
      }).catch(()=>{box.innerHTML='Photos sourced from Wikimedia Commons contributors under CC / public-domain licences. See the project repository for per-image credits.';});
    }
  } else box.style.display='none';
}

   ============================================================ */
function buildEmergency(){
  const tiles=EMERGENCY_TILES.map((t,i)=>`<button class="em-tile ${t.danger?'danger-tile':''}" onclick="emGo(${i})">${ICON[t.icon]}<span class="em-label">${t.label}</span></button>`).join('');
  document.getElementById('emergency').innerHTML=`
    <div class="em-header">EMERGENCY MODE</div>
    <div class="em-sub">Tap what you need. In a life-threatening emergency, call 000.</div>
    <a class="em-call" href="tel:000"><div class="ring">${ICON.phone}</div><div><b>000</b><span>112 from any mobile · 106 text/TTY</span></div></a>
    <div class="em-grid">${tiles}</div>
    <div class="em-exit-wrap"><button class="em-exit" id="emExitBtn" onclick="emExitTap()">✕ Exit Emergency Mode</button></div>`;
}
function emGo(i){const t=EMERGENCY_TILES[i];if(t.t==='tab'){closeEmergency();switchTab(t.id);}else openArticle(t.t,t.id);}
let emExitArmed=false;
function emExitTap(){const btn=document.getElementById('emExitBtn');
  if(!emExitArmed){emExitArmed=true;btn.classList.add('em-confirm');btn.textContent='Tap again to confirm exit';return;}closeEmergency();}
function openEmergency(){buildEmergency();emExitArmed=false;document.getElementById('emergency').classList.add('open');document.body.style.overflow='hidden';}
function closeEmergency(){emExitArmed=false;document.getElementById('emergency').classList.remove('open');document.body.style.overflow='';}

/* ============================================================
   NOTES
   ============================================================ */
const NOTE_TYPE_LABEL={'general':'General','camp-log':'Camp Log','hunting':'Hunting','fishing':'Fishing','survival-journal':'Survival Journal'};
function getNotes(){return LS.get('bc_notes',[]);}
function saveNotes(n){LS.set('bc_notes',n);}
let noteSearch='';
function renderNotes(){
  let notes=getNotes().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const total=notes.length;
  if(noteSearch){const q=noteSearch.toLowerCase();
    notes=notes.filter(n=>((n.title||'')+' '+(n.body||'')+' '+(n.tags||[]).join(' ')).toLowerCase().includes(q));}
  let body;
  if(!total){body=`<div class="empty-hint">No notes yet. Tap <strong>+</strong> to log a camp, a route, a catch, or anything worth remembering. Notes stay on this device — no cloud, no account.</div>`;}
  else if(!notes.length){body=`<div class="empty-hint">No notes match "${escapeHtml(noteSearch)}".</div>`;}
  else{body=notes.map(n=>`<div class="note-card" onclick="openNoteEditor('${n.id}')">
      <div class="nc-title">${escapeHtml(n.title||'Untitled')}</div>
      <div class="nc-body">${escapeHtml(n.body||'')}</div>
      <div class="nc-meta"><span class="chip">${NOTE_TYPE_LABEL[n.type]||'General'}</span>
      ${(n.tags||[]).slice(0,3).map(t=>`<span class="chip">${escapeHtml(t)}</span>`).join('')}
      <span class="nc-date">${fmtDate(n.updatedAt)}</span></div></div>`).join('');}
  document.getElementById('screen-notes').innerHTML=
    banner('ban-notes','Notes',`Offline field journal. ${total} note${total===1?'':'s'}.`)+
    (total?`<div class="searchbar">${ICON.search}<input placeholder="Search notes…" value="${escapeHtml(noteSearch)}" oninput="noteSearch=this.value;renderNotes()" id="noteSearchInp"></div>`:'')+body;
  if(noteSearch){const i=document.getElementById('noteSearchInp');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
}
function openNoteEditor(id){
  const delRow=document.getElementById('noteDeleteRow');
  if(id){const n=getNotes().find(x=>x.id===id);if(!n)return;
    document.getElementById('noteEditorTitle').textContent='Edit Note';
    document.getElementById('noteId').value=n.id;document.getElementById('noteTitle').value=n.title||'';
    document.getElementById('noteType').value=n.type||'general';document.getElementById('noteBody').value=n.body||'';
    document.getElementById('noteTags').value=(n.tags||[]).join(', ');delRow.style.display='flex';}
  else{document.getElementById('noteEditorTitle').textContent='New Note';document.getElementById('noteId').value='';
    document.getElementById('noteTitle').value='';document.getElementById('noteType').value='general';
    document.getElementById('noteBody').value='';document.getElementById('noteTags').value='';delRow.style.display='none';}
  document.getElementById('noteModal').classList.add('open');document.body.style.overflow='hidden';
}
function closeNoteEditor(){document.getElementById('noteModal').classList.remove('open');document.body.style.overflow='';}
function saveNote(){
  const id=document.getElementById('noteId').value;
  const title=document.getElementById('noteTitle').value.trim();const body=document.getElementById('noteBody').value.trim();
  const type=document.getElementById('noteType').value;
  const tags=document.getElementById('noteTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title&&!body){closeNoteEditor();return;}
  const now=new Date().toISOString();let notes=getNotes();
  if(id)notes=notes.map(n=>n.id===id?{...n,title,body,type,tags,updatedAt:now}:n);
  else notes.push({id:'n'+Date.now(),title:title||'Untitled',body,type,tags,createdAt:now,updatedAt:now});
  saveNotes(notes);closeNoteEditor();renderNotes();
}
function deleteCurrentNote(){const id=document.getElementById('noteId').value;if(!id){closeNoteEditor();return;}
  if(!confirm('Delete this note? This cannot be undone.'))return;
  saveNotes(getNotes().filter(n=>n.id!==id));closeNoteEditor();renderNotes();}

/* ---------- utils ---------- */
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}catch(e){return'';}}

/* close sheets on backdrop tap */
['noteModal','settingsModal'].forEach(idd=>document.getElementById(idd).addEventListener('click',function(e){if(e.target===this){this.classList.remove('open');document.body.style.overflow='';}}));

/* ---------- init ---------- */
document.getElementById('searchBtn').innerHTML=ICON.search;
document.getElementById('settingsBtn').innerHTML=ICON.gear;
initInstall();applySettings();buildSearchIndex();renderNav();switchTab('home');
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
